<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Master Computer Dullewala — AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f1e;
    color: #e8eaf6;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #0d1630;
    border-bottom: 1px solid #1e3a6e;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }

  .logo-text h1 { font-size: 16px; font-weight: 600; color: #e8eaf6; letter-spacing: 0.3px; }
  .logo-text span { font-size: 11px; color: #5c8adb; letter-spacing: 1px; text-transform: uppercase; }

  .status-dot { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4caf50; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .new-chat-btn {
    background: transparent; border: 1px solid #1e3a6e; color: #5c8adb;
    padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
    margin-left: 12px; transition: all 0.2s;
  }
  .new-chat-btn:hover { background: #0d1e40; color: #90b8f8; }

  #chat-box {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
  }
  #chat-box::-webkit-scrollbar { width: 5px; }
  #chat-box::-webkit-scrollbar-thumb { background: #1e3a6e; border-radius: 10px; }

  .welcome { text-align: center; margin: auto; padding: 40px 20px; }
  .welcome-icon { font-size: 48px; margin-bottom: 16px; }
  .welcome h2 { font-size: 22px; font-weight: 600; color: #90b8f8; margin-bottom: 8px; }
  .welcome p { font-size: 14px; color: #8090b0; max-width: 340px; margin: 0 auto; line-height: 1.6; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 24px; }
  .suggestion-btn {
    background: #0d1e40; border: 1px solid #1e3a6e; color: #90b8f8;
    padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .suggestion-btn:hover { background: #1a3060; border-color: #3a6abf; }

  .msg { display: flex; gap: 10px; max-width: 780px; width: 100%; margin: 0 auto; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.ai { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; }
  .avatar.user-av { background: #1e3a6e; color: #90b8f8; }

  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; max-width: calc(100% - 48px); word-break: break-word; }
  .msg.ai .bubble { background: #0d1e40; border: 1px solid #1e3a6e; border-top-left-radius: 4px; color: #d8e4f8; }
  .msg.user .bubble { background: #1a73e8; border-top-right-radius: 4px; color: #fff; }

  .typing-dots span {
    display: inline-block; width: 7px; height: 7px; background: #5c8adb;
    border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .input-area { background: #0d1630; border-top: 1px solid #1e3a6e; padding: 16px; }
  .input-wrap { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }

  #user-input {
    flex: 1; background: #0a1428; border: 1px solid #1e3a6e; border-radius: 14px;
    padding: 12px 16px; color: #e8eaf6; font-size: 14px; font-family: inherit;
    resize: none; min-height: 48px; max-height: 140px; outline: none; line-height: 1.5; transition: border-color 0.2s;
  }
  #user-input:focus { border-color: #3a6abf; }
  #user-input::placeholder { color: #3a5080; }

  #send-btn {
    width: 46px; height: 46px; background: #1a73e8; border: none; border-radius: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  #send-btn:hover { background: #1558c0; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 20px; height: 20px; fill: #fff; }

  .input-hint { text-align: center; font-size: 11px; color: #3a5080; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">M</div>
  <div class="logo-text">
    <h1>Master Computer Dullewala</h1>
    <span>AI Content Assistant</span>
  </div>
  <div class="status-dot">
    <div class="dot"></div> Online
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
</header>

<div id="chat-box">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>How can I help you today?</h2>
    <p>Ask me anything — content writing, questions, ideas, or anything else you need.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="suggest('Write a product description for a laptop')">Write product description</button>
      <button class="suggestion-btn" onclick="suggest('Give me 5 blog post ideas about technology')">Blog post ideas</button>
      <button class="suggestion-btn" onclick="suggest('Write a short professional bio for me')">Write a bio</button>
      <button class="suggestion-btn" onclick="suggest('What is artificial intelligence?')">What is AI?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Type your message here..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Powered by Master Computer Dullewala AI</div>
</div>

<script>
  const GROQ_API_KEY = "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";
  const MODEL = "llama3-8b-8192";
  let messages = [];
  let isTyping = false;

  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  function suggest(text) { userInput.value = text; sendMessage(); }

  function newChat() {
    messages = [];
    chatBox.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>How can I help you today?</h2>
        <p>Ask me anything — content writing, questions, ideas, or anything else you need.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="suggest('Write a product description for a laptop')">Write product description</button>
          <button class="suggestion-btn" onclick="suggest('Give me 5 blog post ideas about technology')">Blog post ideas</button>
          <button class="suggestion-btn" onclick="suggest('Write a short professional bio for me')">Write a bio</button>
          <button class="suggestion-btn" onclick="suggest('What is artificial intelligence?')">What is AI?</button>
        </div>
      </div>`;
  }

  function addMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar ${role === 'ai' ? 'ai' : 'user-av'}">${role === 'ai' ? 'M' : 'U'}</div>
      <div class="bubble">${text}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `<div class="avatar ai">M</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isTyping) return;
    userInput.value = '';
    userInput.style.height = 'auto';
    isTyping = true;
    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GROQ_API_KEY
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: 'system', content: 'You are a helpful AI content assistant for Master Computer Dullewala. Answer clearly and helpfully in the same language the user writes in.' },
            ...messages
          ],
          max_tokens: 1024,
          temperature: 0.7
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content;
        messages.push({ role: 'assistant', content: reply });
        addMessage('ai', reply.replace(/\n/g, '<br>'));
      } else {
        addMessage('ai', '⚠️ Error: ' + (data.error ? data.error.message : 'Something went wrong. Please try again.'));
      }
    } catch (err) {
      removeTyping();
      addMessage('ai', '⚠️ Connection error: ' + err.message);
    }
    isTyping = false;
  }
</script>
</body>
</html>
